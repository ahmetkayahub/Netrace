name: Auto Import JSON from SharePoint

on:
  schedule:
    # Her 15 dakikada bir çalış
    - cron: '*/15 * * * *'
  
  # Manuel tetikleme
  workflow_dispatch:
  
  # Push olduğunda test et
  push:
    branches:
      - main
    paths:
      - 'scripts/auto_import_json.py'
      - '.github/workflows/auto_import_json.yml'

jobs:
  import-json:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: 🔧 Setup rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version
      
      - name: 🔐 Configure rclone for OneDrive/SharePoint
        run: |
          mkdir -p ~/.config/rclone
          
          # rclone config dosyası oluştur
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [sharepoint]
          type = onedrive
          token = ${{ secrets.ONEDRIVE_TOKEN }}
          drive_id = ${{ secrets.ONEDRIVE_DRIVE_ID }}
          drive_type = business
          EOF
          
          echo "✅ rclone configured"
      
      - name: 📂 Create data directory
        run: |
          mkdir -p data
          echo "✅ data/ directory created"
      
      - name: ⬇️ Download JSON files from SharePoint
        run: |
          echo "📥 Downloading JSON files from SharePoint..."
          
          # SharePoint'ten sadece JSON dosyalarını indir
          rclone copy sharepoint:Documents/ data/ \
            --include "*.json" \
            --exclude "Master.xlsx" \
            --verbose
          
          # İndirilen dosyaları listele
          echo ""
          echo "📄 Downloaded files:"
          find data -type f -name "*.json" | sort
          
          file_count=$(find data -type f -name "*.json" | wc -l)
          echo ""
          echo "✅ Total JSON files downloaded: $file_count"
      
      - name: 🔄 Process JSON files and update Master.xlsx
        run: |
          echo "🔄 Processing JSON files..."
          python3 scripts/auto_import_json.py --base-dir data --master data/Master.xlsx
      
      - name: ⬆️ Upload Master.xlsx to SharePoint
        if: success()
        run: |
          echo "⬆️ Uploading Master.xlsx to SharePoint..."
          
          if [ -f "data/Master.xlsx" ]; then
            rclone copy data/Master.xlsx sharepoint:Documents/ --verbose
            echo "✅ Master.xlsx uploaded successfully"
          else
            echo "⚠️ Master.xlsx not found, skipping upload"
          fi
      
      - name: 📊 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-excel-${{ github.run_number }}
          path: |
            data/Master.xlsx
            data/**/*.json
          retention-days: 30
      
      - name: 📝 Summary
        if: always()
        run: |
          echo "## 📊 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "data/Master.xlsx" ]; then
            echo "✅ Master.xlsx updated and uploaded" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Master.xlsx not found" >> $GITHUB_STEP_SUMMARY
          fi

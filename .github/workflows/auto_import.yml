name: Auto Import PDFs from SharePoint

on:
  # Scheduled run every 15 minutes
  schedule:
    - cron: '*/15 * * * *'
  
  # Manual trigger
  workflow_dispatch:
  
  # Trigger on push (for testing)
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'utils/**'
      - '.github/workflows/auto_import.yml'

jobs:
  import:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔧 Create data directory
        run: |
          mkdir -p data
      
      - name: 🚀 Run auto import
        env:
          # SharePoint credentials (stored in GitHub Secrets)
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_BASE_FOLDER: ${{ secrets.SHAREPOINT_BASE_FOLDER || '/Documents' }}
          SHAREPOINT_MASTER_PATH: ${{ secrets.SHAREPOINT_MASTER_PATH || '/Documents/Master.xlsx' }}
          USE_SHAREPOINT: 'true'
        run: |
          python scripts/auto_import.py
      
      - name: 📊 Upload Master.xlsx as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-excel-${{ github.run_number }}
          path: data/Master.xlsx
          retention-days: 30
      
      - name: 📊 Upload import state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-state-${{ github.run_number }}
          path: data/import_state.json
          retention-days: 30
      
      - name: 📝 Summary
        if: always()
        run: |
          echo "## Auto Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/Master.xlsx ]; then
            echo "✅ Master.xlsx updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Master.xlsx not found" >> $GITHUB_STEP_SUMMARY
          fi
